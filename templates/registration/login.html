{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Define a imagem de fundo no corpo da página inteira */
    body {
        /* O caminho da sua imagem estática */
        background-image: url("{% static 'pc.png' %}");
        /* Centraliza a imagem */
        background-position: center center;
        /* Impede que a imagem se repita (ladrilho) */
        background-repeat: no-repeat;
        
        /* --- MUDANÇA PRINCIPAL AQUI --- */
        /* 'contain' garante que a imagem apareça inteira sem distorcer */
        background-size: contain;
        /* Garante que o fundo que sobrar fique preto para combinar com a imagem */
        background-color: black;
        /* ------------------------------ */

        /* Fixa a imagem para ela não rolar com a página */
        background-attachment: fixed;
        /* Garante que a altura seja 100% da tela */
        height: 100vh;
        margin: 0;
    }

    /* Uma camada escura semi-transparente sobre a imagem de fundo 
       para melhorar a leitura do formulário (opcional, se quiser mais claro, diminua o 0.5) */
    .overlay-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
        padding: 20px;
        /* Sombra suave sobre a imagem. Se quiser tirar, mude para rgba(0,0,0,0) */
        background-color: rgba(0, 0, 0, 0.3); 
    }

    /* Estilo do Card Transparente */
    .login-card-transparent {
        width: 100%;
        max-width: 380px;
        padding: 40px;
        /* Transparência do cartão. 0.85 é um bom equilíbrio. */
        background-color: rgba(20, 20, 20, 0.85); 
        
        border: 1px solid rgba(255, 255, 255, 0.1); /* Borda sutil */
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.9); /* Sombra forte para destacar */
    }
</style>

<div class="overlay-container">

    <div class="card login-card-transparent">

        <h2 style="text-align: center; color: white; margin-bottom: 30px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">
            Bem-vindo
        </h2>

        <form method="post">
            {% csrf_token %}

            <div style="color: white; margin-bottom: 20px;">
                {{ form.as_p }}
            </div>

            <button type="submit" style="width:100%; padding: 15px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; background-color: #15A0A5; border: none; color: white; border-radius: 30px; transition: background-color 0.3s, transform 0.2s;">
                ENTRAR
            </button>
        </form>
    </div>

</div>

<script>
    const inputs = document.querySelectorAll('.card form input[type="text"], .card form input[type="password"]');
    inputs.forEach(input => {
        input.style.width = '100%';
        input.style.padding = '12px';
        input.style.marginBottom = '15px';
        // Fundo dos inputs também um pouco transparente
        input.style.backgroundColor = 'rgba(255, 255, 255, 0.1)'; 
        input.style.border = '1px solid rgba(255, 255, 255, 0.3)';
        input.style.color = 'white';
        input.style.borderRadius = '8px';
        input.style.outline = 'none';
    });
    
    // Efeito ao clicar no input
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.style.border = '1px solid #15A0A5';
            this.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
        });
        input.addEventListener('blur', function() {
            this.style.border = '1px solid rgba(255, 255, 255, 0.3)';
             this.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
        });
    });

    const labels = document.querySelectorAll('.card form label');
    labels.forEach(label => {
        label.style.fontWeight = 'normal';
        label.style.display = 'block';
        label.style.marginBottom = '8px';
        label.style.marginTop = '10px';
        label.style.color = '#ccc';
        label.style.fontSize = '0.9em';
    });
</script>
{% endblock %}
