{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    body.login-page .content {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 100vh !important;
        padding: 20px !important;
    }
    .login-wrap {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
    }
    .login-card-transparent {
        width: 100%;
        padding: 40px;
        background-color: rgba(20, 20, 20, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.9);
    }
</style>

<div class="login-wrap">
    <div class="card login-card-transparent">
        <h2 style="text-align: center; color: white; margin-bottom: 30px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">
            Bem-vindo
        </h2>

        <form method="post">
            {% csrf_token %}

            {% if messages %}
            <div style="margin-bottom: 16px;">
                {% for message in messages %}
                <div style="padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 0.92em;
                    background: {% if message.tags == 'error' %}rgba(207,102,121,0.25){% elif message.tags == 'warning' %}rgba(255,152,0,0.2){% else %}rgba(21,160,165,0.2){% endif %};
                    border: 1px solid {% if message.tags == 'error' %}#cf6679{% elif message.tags == 'warning' %}#ff9800{% else %}#15a0a5{% endif %};
                    color: #fff;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <div style="color: white; margin-bottom: 20px;">
                {{ form.as_p }}
            </div>

            <button type="submit" style="width:100%; padding: 15px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; background-color: #15A0A5; border: none; color: white; border-radius: 30px;">
                ENTRAR
            </button>
        </form>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.login-card-transparent form input[type="text"], .login-card-transparent form input[type="password"]');
    inputs.forEach(input => {
        input.style.width = '100%';
        input.style.padding = '12px';
        input.style.marginBottom = '15px';
        input.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
        input.style.border = '1px solid rgba(255, 255, 255, 0.3)';
        input.style.color = 'white';
        input.style.borderRadius = '8px';
        input.style.boxSizing = 'border-box';
    });
    document.querySelectorAll('.login-card-transparent form label').forEach(label => {
        label.style.display = 'block';
        label.style.marginBottom = '8px';
        label.style.color = '#ccc';
        label.style.fontSize = '0.9em';
    });
</script>
{% endblock %}
