{% extends 'base.html' %}

{% block title %}PDV - Nova Venda{% endblock %}

{% block content %}

<input type="hidden" id="cliente_id_hidden">
<input type="hidden" id="produto_id_hidden">
<input type="hidden" id="venda_id_edicao" value="{{ venda_aberta.id|default:'' }}">

<div class="pdv-container">
    
    <div class="painel-esquerdo">
        
        <div class="card">
            <h3>Dados da Venda</h3>
            <label>Cliente</label>
            <input type="text" id="cliente_input" list="lista_clientes" placeholder="Busque o cliente..." onchange="buscarClienteID()" autocomplete="off">
            <datalist id="lista_clientes">
                <option value="Venda Direta" data-id="">Consumidor Final</option>
                {% for cliente in clientes %}
                <option value="{{ cliente.nome }}" data-id="{{ cliente.id }}"></option>
                {% endfor %}
            </datalist>

            <label>Tipo</label>
            <select id="tipo_venda">
                <option value="FINALIZADO">Venda Direta</option>
                <option value="ORCAMENTO">Orçamento</option>
            </select>
        </div>

        <div class="card card-auto-height">
            <h3>Adicionar Produto</h3>
            <label>Produto</label>
            <input type="text" id="produto_input" list="lista_produtos" placeholder="Nome ou código..." onchange="buscarProdutoDetalhes()" autocomplete="off">
            <datalist id="lista_produtos">
                {% for produto in produtos %}
                <option value="{{ produto.nome_venda }}" data-id="{{ produto.id }}" data-preco="{{ produto.preco_venda }}">
                    (Estoque: {{ produto.item_estoque.quantidade_estoque }})
                </option>
                {% endfor %}
            </datalist>

            <div class="row-flex">
                <div class="col-flex">
                    <label>Quantidade</label>
                    <input type="number" id="qtd_input" value="1" min="1">
                </div>
                <div class="col-flex">
                    <label>Preço Unit. (R$)</label>
                    <input type="number" id="preco_input" placeholder="0.00">
                </div>
            </div>

            <div style="margin-top: auto;">
                <button onclick="adicionarAoCarrinho()">ADICIONAR ITEM (Enter)</button>
            </div>
        </div>
    </div>

    <div class="painel-direito">
        <div class="card card-full-height">
            <h3>CUPOM FISCAL</h3>
            
            <div class="cupom-body">
                <table class="cupom-table">
                    <thead>
                        <tr>
                            <th style="width: 50%;">Produto</th>
                            <th style="text-align: center;">Qtd</th>
                            <th style="text-align: right;">Total</th>
                            <th style="width: 30px;"></th>
                        </tr>
                    </thead>
                    <tbody id="lista-itens">
                        </tbody>
                </table>
            </div>

            <div class="cupom-footer">
                
                <input type="checkbox" id="checkEntrega" style="display:none !important;">

                <label>Taxa de Entrega (R$)</label>
                <input type="number" id="inputTaxa" value="0.00" disabled>

                <label>Forma de Pagamento</label>
                <select id="selectPagamento">
                    <option value="DINHEIRO">Dinheiro</option>
                    <option value="PIX" selected>Pix</option>
                    <option value="CREDITO">Cartão de Crédito</option>
                    <option value="DEBITO">Cartão de Débito</option>
                </select>

                <div id="div_troco" style="display: none; margin-top: 10px; background-color: #333; padding: 10px; border-radius: 5px; border: 1px dashed #15a0a5;">
                    <label style="color: #15a0a5; font-weight: bold; font-size: 0.9em;">
                        <i class="fas fa-money-bill-wave"></i> Levar troco para quanto?
                    </label>
                    <input type="number" step="0.01" id="input_troco_para" class="form-control" placeholder="Ex: 50.00 ou 100.00" style="margin-top: 5px;">
                </div>
                <div class="check-container" style="margin-top: 10px;">
                    <input type="checkbox" id="check_finalizar_depois">
                    <label for="check_finalizar_depois">Finalizar Venda Depois (Deixar em Aberto)</label>
                </div>

                <div class="total-display" id="valorTotalDisplay">R$ 0.00</div>

                <button onclick="finalizarVenda()">FINALIZAR VENDA (F2)</button>
            </div>
        </div>
    </div>

</div>

<script>
    let carrinho = [];
    const itensPreCarregados = {{ itens_json|safe|default:"[]" }};
    
    // --- LÓGICA DO TROCO ---
    const selectPagamento = document.getElementById('selectPagamento'); 
    const divTroco = document.getElementById('div_troco');
    const inputTroco = document.getElementById('input_troco_para');

    function verificarTroco() {
        let texto = selectPagamento.options[selectPagamento.selectedIndex].text.toLowerCase();
        if (texto.includes('dinheiro')) {
            divTroco.style.display = 'block';
            inputTroco.required = true;
        } else {
            divTroco.style.display = 'none';
            inputTroco.value = ''; 
            inputTroco.required = false;
        }
    }
    selectPagamento.addEventListener('change', verificarTroco);
    // -----------------------
    
    window.onload = function() {
        verificarTroco(); // Roda ao iniciar

        if (itensPreCarregados.length > 0) {
            carrinho = itensPreCarregados;
            renderizarTabela();
            {% if venda_aberta %}
                {% if venda_aberta.cliente %}
                    document.getElementById('cliente_input').value = "{{ venda_aberta.cliente.nome }}";
                    document.getElementById('cliente_id_hidden').value = "{{ venda_aberta.cliente.id }}";
                {% endif %}
                let taxa = "{{ venda_aberta.taxa_entrega|stringformat:'.2f' }}".replace(',', '.');
                if(document.getElementById('inputTaxa')) document.getElementById('inputTaxa').value = taxa;
                let pgto = "{{ venda_aberta.forma_pagamento }}";
                if(pgto) {
                    document.getElementById('selectPagamento').value = pgto;
                    verificarTroco(); // Garante que mostre se vier do banco como Dinheiro
                }
                calcularTotalGeral();
            {% endif %}
        }
        
        const clienteInput = document.getElementById('cliente_input');
        if (clienteInput) {
            clienteInput.addEventListener('input', verificarEntregaAutomatica);
            clienteInput.addEventListener('change', verificarEntregaAutomatica);
        }
        const inputTaxa = document.getElementById('inputTaxa');
        if (inputTaxa) {
            inputTaxa.addEventListener('input', calcularTotalGeral);
            inputTaxa.addEventListener('change', calcularTotalGeral);
        }
    };

    function verificarEntregaAutomatica() {
        const nome = document.getElementById('cliente_input').value.trim();
        const nomeUpper = nome.toUpperCase();
        const checkEntrega = document.getElementById('checkEntrega');
        const inputTaxa = document.getElementById('inputTaxa');

        if (nome.length > 0 && nomeUpper !== "VENDA DIRETA" && nomeUpper !== "CONSUMIDOR FINAL") {
            checkEntrega.checked = true;
            inputTaxa.disabled = false;
        } else {
            checkEntrega.checked = false;
            inputTaxa.value = "0.00";
            inputTaxa.disabled = true;
            calcularTotalGeral();
        }
    }

    function buscarClienteID() {
        const inputVal = document.getElementById('cliente_input').value;
        const datalist = document.getElementById('lista_clientes');
        const options = datalist.options;
        let hiddenId = "";
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === inputVal) {
                hiddenId = options[i].getAttribute('data-id');
                break;
            }
        }
        document.getElementById('cliente_id_hidden').value = hiddenId;
        verificarEntregaAutomatica();
    }

    function buscarProdutoDetalhes() {
        const inputVal = document.getElementById('produto_input').value;
        const datalist = document.getElementById('lista_produtos');
        const options = datalist.options;
        if(inputVal === "") { limparInputsProduto(); return; }
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === inputVal) {
                const id = options[i].getAttribute('data-id');
                const preco = options[i].getAttribute('data-preco');
                document.getElementById('produto_id_hidden').value = id;
                document.getElementById('preco_input').value = parseFloat(preco).toFixed(2);
                document.getElementById('qtd_input').select();
                return;
            }
        }
        limparInputsProduto();
    }

    function limparInputsProduto() {
        document.getElementById('produto_id_hidden').value = "";
        document.getElementById('preco_input').value = "";
    }

    function adicionarAoCarrinho() {
        const id = document.getElementById('produto_id_hidden').value;
        const nome = document.getElementById('produto_input').value;
        const precoInput = document.getElementById('preco_input').value;
        const qtd = parseInt(document.getElementById('qtd_input').value);

        if (!id || !nome) { alert("Selecione um produto válido!"); return; }
        if (!precoInput) { alert("Preço inválido!"); return; }

        const precoFinal = parseFloat(precoInput);
        const itemExistente = carrinho.find(item => item.id === id && item.preco === precoFinal);
        
        if (itemExistente) { itemExistente.quantidade += qtd; } 
        else { carrinho.push({ id, nome, preco: precoFinal, quantidade: qtd }); }

        renderizarTabela();
        document.getElementById('qtd_input').value = 1;
        document.getElementById('produto_input').value = "";
        document.getElementById('produto_id_hidden').value = "";
        document.getElementById('preco_input').value = "";
        document.getElementById('produto_input').focus();
    }

    function removerItem(index) {
        carrinho.splice(index, 1);
        renderizarTabela();
    }

    function renderizarTabela() {
        const tbody = document.getElementById('lista-itens'); 
        if(!tbody) return; 
        tbody.innerHTML = '';
        
        carrinho.forEach((item, index) => {
            const totalItem = item.preco * item.quantidade;
            const tr = `
                <tr>
                    <td>${item.nome}</td>
                    <td style="text-align: center;">${item.quantidade}</td>
                    <td style="text-align: right;">${totalItem.toFixed(2)}</td>
                    <td style="text-align: center;">
                        <button class="btn-remove" onclick="removerItem(${index})">X</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += tr;
        });
        calcularTotalGeral();
    }

    function calcularTotalGeral() {
        let totalProdutos = 0;
        carrinho.forEach(item => { totalProdutos += item.preco * item.quantidade; });
        const taxa = parseFloat(document.getElementById('inputTaxa').value) || 0;
        document.getElementById('valorTotalDisplay').innerText = 'R$ ' + (totalProdutos + taxa).toFixed(2);
    }

    function finalizarVenda() {
        if (carrinho.length === 0) { alert("Carrinho vazio!"); return; }
        
        const checkFinalizarDepois = document.getElementById('check_finalizar_depois');
        const isEntrega = document.getElementById('checkEntrega').checked;
        const displayTotal = document.getElementById('valorTotalDisplay');

        // --- CORREÇÃO DO STATUS ---
        // Se for Entrega, o status DEVE ser 'EM_PREPARACAO' para aparecer pro Motoboy.
        // Se for Balcão (não entrega), aí sim pode ser 'FINALIZADO'.
        let statusVenda = 'FINALIZADO';
        
        if (isEntrega) {
            statusVenda = 'EM_PREPARACAO'; // Mágica para aparecer no App do Motoboy
        } else if (checkFinalizarDepois && checkFinalizarDepois.checked) {
            statusVenda = 'ABERTO'; // Deixar em aberto no balcão
        }
        // --------------------------

        // VALIDAÇÃO DO TROCO
        let valorTroco = 0;
        // Agora verifica com MAIÚSCULO por causa da mudança no HTML
        if (document.getElementById('selectPagamento').value === 'DINHEIRO') {
             valorTroco = document.getElementById('input_troco_para').value;
        }

        const dadosVenda = {
            venda_id: document.getElementById('venda_id_edicao').value || null, 
            cliente_id: document.getElementById('cliente_id_hidden').value || null,
            status: statusVenda, 
            forma_pagamento: document.getElementById('selectPagamento').value,
            taxa_entrega: document.getElementById('inputTaxa').value,
            total_final: displayTotal ? parseFloat(displayTotal.innerText.replace('R$ ', '')) : 0,
            
            // Enviamos o troco aqui
            troco_para: valorTroco,

            itens: carrinho,
            eh_entrega: isEntrega,
            endereco_entrega: ''
        };

        fetch('{% url "salvar_venda" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify(dadosVenda)
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'sucesso') {
                // Se for entrega ou aberto, volta pra lista. Se finalizou balcão, vai pro detalhe.
                if (statusVenda === 'ABERTO' || statusVenda === 'EM_PREPARACAO') {
                    window.location.href = "{% url 'lista_vendas' %}";
                } 
                else {
                    window.location.href = "/vendas/detalhes/" + data.venda_id + "/";
                }
            } else { alert("Erro: " + data.mensagem); }
        });
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Enter") {
            const active = document.activeElement;
            if (active.id === 'produto_input' || active.id === 'qtd_input' || active.id === 'preco_input') adicionarAoCarrinho();
        }
        if (event.key === "F2") { event.preventDefault(); finalizarVenda(); }
    });
</script>

{% endblock %}
