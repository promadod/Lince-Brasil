{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root { --cor-tema: #15A0A5; --cor-fundo-card: #1e1e1e; }
    .card-custom { background-color: var(--cor-fundo-card); border-left: 5px solid var(--cor-tema); color: #fff; }
    .form-control { background-color: #2c2c2c; border: 1px solid #444; color: #fff; }
    .form-control:focus { background-color: #333; color: #fff; border-color: var(--cor-tema); }
    .btn-tema { background-color: var(--cor-tema); color: white; border: none; }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-custom p-4 shadow-lg">
                <h4 class="mb-4 fw-bold"><i class="fas fa-user-helmet me-2"></i>{{ titulo }}</h4>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label text-muted small">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-tema btn-lg">Salvar Entregador</button>
                        <a href="{% url 'lista_entregas' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
