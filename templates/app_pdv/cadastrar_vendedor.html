{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --cor-tema: #15A0A5;
        --cor-fundo-card: #1e1e1e;
    }
    .card-custom {
        background-color: var(--cor-fundo-card);
        border: 1px solid #333;
        border-left: 5px solid var(--cor-tema);
        border-radius: 8px;
        color: white;
    }
    .form-control {
        background-color: #2c2c2c;
        border: 1px solid #444;
        color: #fff;
    }
    .form-control:focus {
        background-color: #333;
        color: #fff;
        border-color: var(--cor-tema);
        box-shadow: 0 0 0 0.25rem rgba(21, 160, 165, 0.25);
    }
    .btn-tema {
        background-color: var(--cor-tema);
        color: white;
        font-weight: bold;
        border: none;
    }
    .btn-tema:hover {
        background-color: #118185;
        color: white;
    }
    label {
        margin-bottom: 5px;
        color: #ccc;
    }
    .helptext {
        font-size: 11px;
        color: #888;
        display: block;
        margin-top: 2px;
    }
    ul.errorlist {
        color: #ff6b6b;
        list-style: none;
        padding: 0;
        font-size: 12px;
    }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-custom shadow-lg">
                <div class="card-header bg-transparent border-secondary py-3">
                    <h4 class="mb-0 fw-bold">
                        <i class="fas fa-user-plus me-2" style="color: var(--cor-tema);"></i>
                        Cadastrar Novo Usuário
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                {{ field }}
                                
                                {% if field.help_text %}
                                    <small class="helptext">{{ field.help_text|safe }}</small>
                                {% endif %}
                                
                                {% for error in field.errors %}
                                    <div class="text-danger small mt-1">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-tema btn-lg">
                                <i class="fas fa-save me-2"></i> Salvar Vendedor
                            </button>
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
