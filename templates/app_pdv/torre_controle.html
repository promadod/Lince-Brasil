<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre de Controle | Magno Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #121212; /* Fundo Preto Profundo */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar { 
            background-color: #1f1f1f; 
            border-bottom: 2px solid #28a745; /* Linha verde Magno */
        }
        .coluna-kanban {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            min-height: 80vh;
            border: 1px solid #333;
        }
        .titulo-coluna {
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
        }
        
        /* CARD DO PEDIDO */
        .card-pedido {
            background-color: #2c2c2c;
            border: none;
            border-left: 5px solid #555; /* Cor padrão da borda */
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .card-pedido:hover { transform: translateY(-2px); }
        
        /* CORES ESPECÍFICAS DE STATUS */
        .status-PENDENTE { border-left-color: #ffc107; } /* Amarelo */
        .status-EM_PREPARACAO { border-left-color: #2196f3; } /* Azul */
        .status-SAIU_ENTREGA { border-left-color: #9c27b0; } /* Roxo */
        
        /* TEXTOS DENTRO DO CARD */
        .card-header-pedido {
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            font-size: 1.1em;
            color: #ffffff; /* Nome do cliente bem branco */
        }
        .text-valor { 
            color: #28a745; /* Verde Dinheiro */
            font-weight: bold; 
            font-size: 1.2em; 
        }
        .info-clara {
            color: #d1d1d1 !important; /* Cinza bem claro para endereço */
            font-size: 0.95em;
            margin-top: 4px;
        }
        .lista-itens { 
            font-size: 0.9em; 
            color: #ffffff; /* Itens em branco */
            margin: 10px 0; 
            border-top: 1px solid #444; 
            padding-top: 5px; 
        }

        .btn-acao { width: 100%; margin-top: 5px; font-weight: bold; }
        
        /* Animação para chamar atenção no pedido novo */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
        .novo-pedido-alerta { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <audio id="som-alerta" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <nav class="navbar navbar-dark mb-4 px-4">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-broadcast"></i> TORRE DE CONTROLE</span>
        
        <div class="text-end">
            <button id="btnLoja" onclick="toggleLoja()" class="btn btn-sm btn-outline-light me-3">
                <i class="bi bi-shop"></i> Verificando...
            </button>
            <button onclick="alterarTaxaEntrega()" class="btn btn-sm btn-outline-light me-3">
                <i class="bi bi-gear-fill"></i> Config. Taxa App
            </button>
            
            <span class="badge bg-secondary" id="status-conexao">Conectando...</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="coluna-kanban">
                    <h5 class="titulo-coluna text-warning"><i class="bi bi-bell-fill"></i> Aguardando Aprovação</h5>
                    <div id="coluna-pendente"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="coluna-kanban">
                    <h5 class="titulo-coluna text-info"><i class="bi bi-box-seam-fill"></i> Em Separação</h5>
                    <div id="coluna-preparacao"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="coluna-kanban">
                    <h5 class="titulo-coluna" style="color: #d05ce3;"><i class="bi bi-bicycle"></i> Em Rota</h5>
                    <div id="coluna-rota"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "/api/torre/dados/";
        const API_STATUS = "/api/pedido/status/";
        
        let isSomTocando = false;
        let monitorarEntrega = {{ monitorar_entrega|yesno:"true,false" }};
        let listaMotoboys = {{ motoboys_json|safe }};

        function selectMotoboyHtml(p) {
            if (!listaMotoboys.length) {
                return `<div class="text-warning small mb-2"><i class="bi bi-exclamation-triangle"></i> Cadastre entregadores em /entregas/</div>`;
            }
            const opts = listaMotoboys.map(m =>
                `<option value="${m.id}">${m.nome}</option>`
            ).join('');
            return `
                <select id="motoboy-${p.id}" class="form-select form-select-sm mb-2" style="background:#1a1a1a;color:#fff;border-color:#555;">
                    <option value="">Selecione o entregador...</option>
                    ${opts}
                </select>
            `;
        }

        // ------------------ SCRIPT DO BOTÃO DA LOJA ------------------
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/loja/toggle/')
            .then(response => response.json())
            .then(data => {
                atualizarBotaoVisual(data.loja_aberta);
            })
            .catch(err => console.error("Erro ao verificar loja:", err));
        });

        function atualizarBotaoVisual(estaAberta) {
            const btn = document.getElementById('btnLoja');
            if (estaAberta) {
                btn.className = "btn btn-sm btn-success me-3"; 
                btn.innerHTML = '<i class="bi bi-shop"></i> LOJA ABERTA (ON)';
            } else {
                btn.className = "btn btn-sm btn-danger me-3"; 
                btn.innerHTML = '<i class="bi bi-slash-circle"></i> LOJA FECHADA (OFF)';
            }
        }

        function toggleLoja() {
            if(!confirm("Tem certeza que deseja mudar o status de funcionamento da loja?")) return;

            fetch('/api/loja/toggle/', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if(data.sucesso) {
                    atualizarBotaoVisual(data.loja_aberta);
                } else {
                    alert("Erro ao mudar status");
                }
            })
            .catch(err => alert("Erro de conexão ao mudar status"));
        }
        // ------------------------------------------------------------------

        async function atualizarPainel() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (typeof data.monitorar_entrega !== 'undefined') {
                    monitorarEntrega = data.monitorar_entrega;
                }
                if (data.motoboys) {
                    listaMotoboys = data.motoboys;
                }
                
                document.getElementById('coluna-pendente').innerHTML = '';
                document.getElementById('coluna-preparacao').innerHTML = '';
                document.getElementById('coluna-rota').innerHTML = '';

                // A NOVA MÁGICA DO ALARME COMEÇA AQUI
                let temPedidoPendente = false;

                data.pedidos.forEach(pedido => {
                    const card = criarCartao(pedido);
                    
                    if (pedido.status === 'PENDENTE') {
                        document.getElementById('coluna-pendente').innerHTML += card;
                        temPedidoPendente = true; // Registramos que tem alguém precisando de atenção
                    } else if (pedido.status === 'EM_PREPARACAO') {
                        document.getElementById('coluna-preparacao').innerHTML += card;
                    } else if (pedido.status === 'SAIU_ENTREGA') {
                        document.getElementById('coluna-rota').innerHTML += card;
                    }
                });

                // GERENCIADOR INTELIGENTE DO ÁUDIO
                const audio = document.getElementById('som-alerta');
                
                if (temPedidoPendente) {
                    // Se tem pedido esperando e o som ainda não tá tocando, começa a gritar!
                    if (!isSomTocando) {
                        audio.play().catch(() => {
                            console.log("Navegador bloqueou o autoplay. O usuário precisa clicar em algo primeiro.");
                        });
                        isSomTocando = true;
                    }
                } else {
                    // Se não tem ninguém pendente (ou o operador aceitou/recusou), silêncio total.
                    if (isSomTocando) {
                        audio.pause();
                        audio.currentTime = 0; // Reseta o toque pro começo
                        isSomTocando = false;
                    }
                }

                const statusSpan = document.getElementById('status-conexao');
                statusSpan.className = "badge bg-success";
                statusSpan.innerText = "Atualizado Agora";

            } catch (error) {
                console.error("Erro:", error);
                const statusSpan = document.getElementById('status-conexao');
                statusSpan.className = "badge bg-danger";
                statusSpan.innerText = "Erro de Conexão";
            }
        }

        function botaoConfirmarEntrega(id) {
            return `<button onclick="confirmarEntrega(${id})" class="btn btn-success btn-acao">✅ Confirmar Entrega</button>`;
        }

        function criarCartao(p) {
            let botoes = '';
            let classeExtra = '';

            if (!monitorarEntrega) {
                if (p.status === 'PENDENTE') {
                    classeExtra = 'novo-pedido-alerta';
                    botoes = `
                        <button onclick="mudarStatus(${p.id}, 'EM_PREPARACAO')" class="btn btn-success btn-acao">✅ Aceitar Pedido</button>
                        <button onclick="mudarStatus(${p.id}, 'CANCELADO')" class="btn btn-outline-danger btn-sm mt-2 w-100">❌ Recusar</button>
                    `;
                } else if (p.status === 'EM_PREPARACAO') {
                    if (p.eh_entrega === false) {
                        botoes = `
                            <div class="text-center text-dark" style="background-color: #ffc107; padding: 8px; border-radius: 5px; margin-top: 10px; font-weight: bold;">
                                <i class="bi bi-shop"></i> Cliente virá retirar na loja
                            </div>
                            <button onclick="mudarStatus(${p.id}, 'FINALIZADO')" class="btn btn-success btn-acao mt-2">✅ Confirmar Retirada</button>
                        `;
                    } else {
                        let infoMoto = p.entregador_nome
                            ? `<div class="text-center text-white mb-2" style="background:#6f42c1;padding:6px;border-radius:5px;font-weight:bold;"><i class="bi bi-motorcycle"></i> ${p.entregador_nome}</div>`
                            : '';
                        botoes = `
                            ${infoMoto}
                            ${selectMotoboyHtml(p)}
                            <button onclick="enviarParaRota(${p.id})" class="btn btn-warning btn-acao">🛵 Saiu para Entrega</button>
                        `;
                    }
                } else if (p.status === 'SAIU_ENTREGA') {
                    let infoMoto = p.entregador_nome
                        ? `<small class="d-block text-warning mb-2"><i class="bi bi-person-fill"></i> ${p.entregador_nome}</small>`
                        : '';
                    botoes = `
                        ${infoMoto}
                        <button onclick="mudarStatus(${p.id}, 'FINALIZADO')" class="btn btn-secondary btn-acao">🏁 Finalizar / Entregue</button>
                    `;
                }
            } else if (p.status === 'PENDENTE') {
                classeExtra = 'novo-pedido-alerta';
                botoes = `
                    <button onclick="mudarStatus(${p.id}, 'EM_PREPARACAO')" class="btn btn-success btn-acao">✅ Aceitar Pedido</button>
                    <button onclick="mudarStatus(${p.id}, 'CANCELADO')" class="btn btn-outline-danger btn-sm mt-2 w-100">❌ Recusar</button>
                `;
            } else if (p.status === 'EM_PREPARACAO') {
                
                if (p.eh_entrega === false) {
                    botoes = `
                        <div class="text-center text-dark" style="background-color: #ffc107; padding: 8px; border-radius: 5px; margin-top: 10px; font-weight: bold;">
                            <i class="bi bi-shop"></i> Cliente virá retirar na loja
                        </div>
                        <button onclick="mudarStatus(${p.id}, 'FINALIZADO')" class="btn btn-success btn-acao mt-2">✅ Confirmar Retirada (Finalizar)</button>
                    `;
                } else {
                    if (p.entregador_nome) {
                        botoes = `
                            <div class="text-center text-white mt-2" style="background-color: #6f42c1; padding: 8px; border-radius: 5px; font-weight: bold;">
                                <i class="bi bi-motorcycle"></i> ${p.entregador_nome} assumiu!
                            </div>
                            <button onclick="mudarStatus(${p.id}, 'SAIU_ENTREGA')" class="btn btn-outline-light btn-sm w-100 mt-2">Liberar para Rota ➡</button>
                        `;
                    } else {
                        botoes = `
                            <div class="text-center text-info" style="border: 1px dashed #2196f3; padding: 5px; border-radius: 5px; margin-top: 10px;">
                                <i class="bi bi-hourglass-split"></i> Aguardando Entregador aceitar no App...
                            </div>
                        `;
                    }
                }

            } else if (p.status === 'SAIU_ENTREGA') {
                let infoMoto = p.entregador_nome ? `<small class="d-block text-warning mb-2"><i class="bi bi-person-fill"></i> ${p.entregador_nome}</small>` : '';
                
                botoes = `
                    ${infoMoto}
                    <button onclick="mudarStatus(${p.id}, 'FINALIZADO')" class="btn btn-secondary btn-acao">🏁 Finalizar / Entregue</button>
                `;
            }

            return `
                <div class="card card-pedido status-${p.status} ${classeExtra} p-3">
                    <div class="card-header-pedido">
                        <span>#${p.id} - ${p.cliente}</span>
                        <span class="text-valor">R$ ${p.total.toFixed(2)}</span>
                    </div>
                    
                    <div class="info-clara">
                        <i class="bi bi-geo-alt-fill"></i> ${p.endereco ? p.endereco : 'Retirada na Loja'}
                    </div>
                    <div class="info-clara">
                        <i class="bi bi-credit-card-2-front-fill"></i> ${p.pagamento}
                    </div>
                    
                    <div class="lista-itens">
                        ${p.itens.map(i => `<div>• ${i}</div>`).join('')}
                    </div>

                    ${p.obs ? `<div class="alert alert-primary p-2 small text-white border-0 mt-2" style="background-color: #375a7f;"><i class="bi bi-info-circle-fill"></i> Obs: ${p.obs}</div>` : ''}

                    <div class="mt-2">
                        ${botoes}
                    </div>
                </div>
            `;
        }

        async function enviarParaRota(id) {
            const sel = document.getElementById(`motoboy-${id}`);
            const motoboy_id = sel ? sel.value : null;
            if (!motoboy_id) {
                alert('Selecione o entregador antes de liberar para rota.');
                return;
            }
            if (!confirm('Confirmar saída para entrega com este motoboy?')) return;
            await mudarStatus(id, 'SAIU_ENTREGA', true, motoboy_id);
        }

        async function confirmarEntrega(id) {
            if (!confirm("Confirmar entrega e finalizar esta venda?")) return;
            await mudarStatus(id, 'FINALIZADO', true);
        }

        async function mudarStatus(id, novoStatus, skipConfirm = false, motoboy_id = null) {
            if (!skipConfirm && !confirm("Mudar status do pedido?")) return;
            try {
                const payload = { novo_status: novoStatus };
                if (motoboy_id) payload.motoboy_id = parseInt(motoboy_id, 10);
                await fetch(`${API_STATUS}${id}/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
                    body: JSON.stringify(payload)
                });
                atualizarPainel();
            } catch (e) {
                alert("Erro ao atualizar status");
            }
        }

        // Ticks de 5 segundos
        setInterval(atualizarPainel, 5000);
        atualizarPainel(); 
        
        // Hack para o Chrome deixar o áudio tocar (exige um clique na tela antes)
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('som-alerta');
            // Apenas inicializa o motor de áudio do navegador para quando precisar gritar
            audio.play().then(() => { 
                if(!isSomTocando) { audio.pause(); audio.currentTime = 0; }
            }).catch(()=>{});
        }, {once:true});

        function alterarTaxaEntrega() {
            let novaTaxa = prompt("Digite o novo valor da Taxa de Entrega para o App:");
            
            if (novaTaxa != null && novaTaxa != "") {
                fetch('/config/definir_taxa/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nova_taxa: novaTaxa })
                })
                .then(r => r.json())
                .then(data => {
                    if(data.sucesso) {
                        alert("Taxa atualizada com sucesso!");
                    } else {
                        alert("Erro ao atualizar.");
                    }
                });
            }
        }
    </script>
</body>
</html>
